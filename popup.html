<!DOCTYPE html>
<html data-theme="dark" data-font="system" data-size="medium" style="width: 420px; min-width: 420px; height: 600px; min-height: 600px; background: #101010; color-scheme: dark;">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="dark">
  <style>html,body{width:420px;min-width:420px;height:600px;min-height:600px;overflow:hidden;background:#101010;color-scheme:dark;}</style>
  <style>
    [data-theme="dark"] {
      --color-scheme: dark;
      --bg: #101010;
      --bg-sub: #171717;
      --bg-hover: #202020;
      --bg-item-hover: #202020;
      --bg-unread: #171717;
      --border: #2a2a2a;
      --border-light: #2c2a28;
      --text: #f2f2ee;
      --text-2: #b7b5ad;
      --text-3: #8f8d85;
      --text-unread: #f6f5ef;
      --text-unread-2: #c7c5bd;
      --text-unread-3: #96938b;
      --text-read: #aaa69d;
      --text-read-hover: #bdb9b0;
      --accent: #caa85a;
      --accent-soft: rgba(202,168,90,0.12);
      --rail: #e4ba48;
      --rail-strong: #b98b32;
      --scrollbar: #2a2a2a;
      --hot: #ff5520;
      --hot-soft: rgba(255,85,32,0.10);
      --state-ok: #3ccf7a;
      --state-ok-soft: rgba(60,207,122,0.22);
      --state-ok-softer: rgba(60,207,122,0.12);
      --state-fail: #ef6461;
      --state-fail-soft: rgba(239,100,97,0.22);
      --state-fail-softer: rgba(239,100,97,0.12);
      --cat-model: #b39cff;
      --cat-products: #77b7ff;
      --cat-industry: #f2c45a;
      --cat-paper: #62d69f;
      --cat-tips: #ff8a82;
      --cat-default: #8d9298;
      --shadow: 0 1px 3px rgba(0,0,0,0.32);
      --rule-source: #6eb2cf;
      --rule-author: #d4a96a;
      --brand-hot: #e85500;
      --brand-hot-dot: #e40012;
      --brand-hot-glow: rgba(228,0,18,0.45);
    }

    [data-theme="green-dark"] {
      --color-scheme: dark;
      --bg: #0c0f10;
      --bg-sub: #131719;
      --bg-hover: #1a2022;
      --bg-item-hover: #1a2022;
      --bg-unread: #121a1b;
      --border: #252d30;
      --border-light: #2a3033;
      --text: #ecebe2;
      --text-2: #bab8ae;
      --text-3: #949187;
      --text-unread: #f1f0e8;
      --text-unread-2: #c8c6bc;
      --text-unread-3: #96938a;
      --text-read: #aaa69d;
      --text-read-hover: #bdb9b0;
      --accent: #91ad79;
      --accent-soft: rgba(145,173,121,0.14);
      --rail: #9fbd73;
      --rail-strong: #6f8a52;
      --scrollbar: #252d30;
      --hot: #d8955f;
      --hot-soft: rgba(216,149,95,0.13);
      --state-ok: #8fbea8;
      --state-ok-soft: rgba(143,190,168,0.24);
      --state-ok-softer: rgba(143,190,168,0.14);
      --state-fail: #c9898e;
      --state-fail-soft: rgba(201,137,142,0.23);
      --state-fail-softer: rgba(201,137,142,0.13);
      --cat-model: #b49afa;
      --cat-products: #77aef2;
      --cat-industry: #e4ba48;
      --cat-paper: #62d69f;
      --cat-tips: #ef8a84;
      --cat-default: #929083;
      --shadow: 0 1px 3px rgba(0,0,0,0.34);
      --rule-source: #c4a87a;
      --rule-author: #d4bc8a;
      --brand-hot: #e85500;
      --brand-hot-dot: #e40012;
      --brand-hot-glow: rgba(228,0,18,0.45);
    }

    [data-theme="chrome-dark"] {
      --color-scheme: dark;
      --bg: #111317;
      --bg-sub: #181b20;
      --bg-hover: #22262d;
      --bg-item-hover: #22262d;
      --bg-unread: #17202b;
      --border: #303641;
      --border-light: rgba(232,234,237,0.08);
      --text: #edf0f3;
      --text-2: #b8c0c8;
      --text-3: #8d969f;
      --text-unread: #f3f6fa;
      --text-unread-2: #c3cbd3;
      --text-unread-3: #98a2ad;
      --text-read: #848d97;
      --text-read-hover: #aab2bb;
      --accent: #82b2e6;
      --accent-soft: rgba(130,178,230,0.14);
      --rail: #8ab4f8;
      --rail-strong: #5f8fc8;
      --scrollbar: #303641;
      --hot: #ff8a45;
      --hot-soft: rgba(255,138,69,0.13);
      --state-ok: #81c995;
      --state-ok-soft: rgba(129,201,149,0.24);
      --state-ok-softer: rgba(129,201,149,0.14);
      --state-fail: #f28b82;
      --state-fail-soft: rgba(242,139,130,0.20);
      --state-fail-softer: rgba(242,139,130,0.12);
      --cat-model: #c58af9;
      --cat-products: #8ab4f8;
      --cat-industry: #fdd663;
      --cat-paper: #81c995;
      --cat-tips: #f28b82;
      --cat-default: #9aa0a6;
      --shadow: 0 2px 8px rgba(0,0,0,0.40);
      --rule-source: #e8a85a;
      --rule-author: #b8d48c;
      --brand-hot: #e85500;
      --brand-hot-dot: #e40012;
      --brand-hot-glow: rgba(228,0,18,0.45);
    }

    [data-theme="slate-night"] {
      --color-scheme: dark;
      --bg: #0b1418;
      --bg-sub: #111c21;
      --bg-hover: #19262c;
      --bg-item-hover: #19262c;
      --bg-unread: #0e1b22;
      --border: #2d3c43;
      --border-light: #24343b;
      --text: #f0f6fc;
      --text-2: #9da8b1;
      --text-3: #87939e;
      --text-unread: #f0f6fc;
      --text-unread-2: #adb7c1;
      --text-unread-3: #8c98a3;
      --text-read: #87939e;
      --text-read-hover: #c9d1d9;
      --accent: #62bcb5;
      --accent-soft: rgba(98,188,181,0.13);
      --rail: #5ecdc3;
      --rail-strong: #3f928c;
      --scrollbar: #343b46;
      --hot: #ff7a45;
      --hot-soft: rgba(255,122,69,0.14);
      --state-ok: #3fb950;
      --state-ok-soft: rgba(63,185,80,0.22);
      --state-ok-softer: rgba(63,185,80,0.13);
      --state-fail: #f85149;
      --state-fail-soft: rgba(248,81,73,0.18);
      --state-fail-softer: rgba(248,81,73,0.10);
      --cat-model: #a371f7;
      --cat-products: #5f9fd3;
      --cat-industry: #d29922;
      --cat-paper: #55aa72;
      --cat-tips: #df6f68;
      --cat-default: #9198a1;
      --shadow: 0 8px 24px rgba(1,4,9,0.38);
      --rule-source: #78b0d8;
      --rule-author: #d4b870;
      --brand-hot: #e85500;
      --brand-hot-dot: #e40012;
      --brand-hot-glow: rgba(228,0,18,0.45);
    }
    [data-size="small"] { --fs-base: 13px; --fs-title: 13px; --fs-meta: 11px; --item-pad: 12px; }
    [data-size="medium"] { --fs-base: 14px; --fs-title: 14px; --fs-meta: 12px; --item-pad: 14px; }
    [data-size="large"] { --fs-base: 15px; --fs-title: 15px; --fs-meta: 13px; --item-pad: 16px; }
    [data-size="xlarge"] { --fs-base: 17px; --fs-title: 17px; --fs-meta: 14px; --item-pad: 18px; }
    [data-size="xxlarge"] { --fs-base: 19px; --fs-title: 19px; --fs-meta: 15px; --item-pad: 20px; }

    :root {
      --hairline: 1.25px;
      --control-size: 30px;
      --control-radius: 6px;
      --control-icon-size: 16px;
      --control-icon-stroke: 1.6;
      --control-active-scale: 0.9;
      --motion-tap: 0.15s;
      --motion-panel: 0.25s;
      --motion-loading: 0.45s;
      --motion-confirm: 0.6s;
      --motion-result: 1.2s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }


    [data-font="noto-serif"] { --ff-body: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', SimSun, serif; }
    [data-font="lxgw"] { --ff-body: 'LXGW WenKai TC', 'LXGW WenKai', KaiTi, STKaiti, cursive; }
    [data-font="system"] { --ff-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

    html, body {
      width: 420px;
      min-width: 420px;
      height: 600px;
      min-height: 600px;
      overflow: hidden;
      background: var(--bg, #101010);
      color-scheme: var(--color-scheme, dark);
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: var(--ff-body, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif);
      font-size: var(--fs-base, 14px);
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand a {
      width: 38px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      line-height: 0;
      transition: opacity 0.15s ease;
    }

    .brand a:hover {
      opacity: 0.8;
    }

    .brand-logo {
      width: 32px;
      height: 30px;
      display: block;
      flex: none;
      overflow: visible;
    }

    .brand-logo-mark {
      fill: none;
      stroke: var(--brand-hot);
      stroke-linecap: butt;
      stroke-linejoin: miter;
    }

    .brand-logo-dot {
      fill: var(--brand-hot-dot);
      filter: drop-shadow(0 0 3px var(--brand-hot-glow));
      transform-box: fill-box;
      transform-origin: center;
      animation: logo-dot-breathe 2.2s ease-in-out infinite;
    }

    @keyframes logo-dot-breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.32; transform: scale(0.72); }
    }

    @media (prefers-reduced-motion: reduce) {
      .brand-logo-dot {
        animation: none;
      }

      .skeleton-line,
      .btn-icon.is-loading svg,
      .btn-icon.is-result-ok,
      #pollNow.is-result-accent,
      .btn-icon.is-result-danger,
      .btn-mark-read.is-confirmed {
        animation: none;
      }
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .btn-icon {
      width: var(--control-size);
      height: var(--control-size);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 var(--control-size);
      border: none;
      background: none;
      color: var(--text-3);
      border-radius: var(--control-radius);
      cursor: pointer;
      transition:
        background var(--motion-tap) ease,
        color var(--motion-tap) ease,
        transform var(--motion-tap) ease;
    }

    .btn-icon:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .btn-icon:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-icon:active {
      transform: scale(var(--control-active-scale));
    }

    .btn-mark-read {
      display: none;
    }

    .btn-mark-read.visible {
      display: flex;
    }

    .btn-mini {
      font-size: 11px;
      font-family: inherit;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
      color: var(--text-2);
      cursor: pointer;
      transition:
        background var(--motion-tap) ease,
        color var(--motion-tap) ease,
        border-color var(--motion-tap) ease,
        transform var(--motion-tap) ease;
    }

    .btn-mini:hover {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
    }

    .btn-mini:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-mini:active {
      transform: scale(var(--control-active-scale));
    }

    .btn-mark-read.is-confirmed {
      display: flex;
      color: var(--accent);
      animation: control-confirm var(--motion-confirm) ease-out forwards;
    }

    @keyframes control-confirm {
      0% { background: var(--accent-soft); color: var(--accent); transform: scale(1.08); }
      45% { background: var(--accent-soft); color: var(--accent); transform: scale(1); }
      100% { background: transparent; color: var(--text-3); transform: scale(1); }
    }

    .btn-icon svg {
      width: var(--control-icon-size);
      height: var(--control-icon-size);
      stroke: currentColor;
      stroke-width: var(--control-icon-stroke);
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-icon.is-loading svg {
      animation: rotate var(--motion-loading) linear infinite;
    }

    #pollNow.is-loading {
      color: var(--accent);
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }

    .btn-icon.is-result-ok {
      color: var(--state-ok);
      animation: control-result-ok var(--control-result-duration, var(--motion-result)) ease-out forwards;
    }

    #pollNow.is-result-accent {
      color: var(--accent);
      animation: control-result-accent var(--control-result-duration, var(--motion-result)) ease-out forwards;
    }

    .btn-icon.is-result-danger {
      color: var(--state-fail);
      animation: control-result-danger var(--control-result-duration, var(--motion-result)) ease-out forwards;
    }

    @keyframes control-result-ok {
      0% { background: var(--state-ok-soft); color: var(--state-ok); }
      45% { background: var(--state-ok-softer); color: var(--state-ok); }
      82% { background: transparent; color: var(--text-3); }
      100% { background: transparent; color: var(--text-3); }
    }

    @keyframes control-result-accent {
      0% { background: var(--accent-soft); color: var(--accent); }
      45% { background: var(--accent-soft); color: var(--accent); }
      82% { background: transparent; color: var(--text-3); }
      100% { background: transparent; color: var(--text-3); }
    }

    @keyframes control-result-danger {
      0% { background: var(--state-fail-soft); color: var(--state-fail); }
      45% { background: var(--state-fail-softer); color: var(--state-fail); }
      82% { background: transparent; color: var(--text-3); }
      100% { background: transparent; color: var(--text-3); }
    }

    /* ---- Settings ---- */
    .settings {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.28s ease;
      background: var(--bg-sub);
    }

    .settings.open {
      max-height: 420px;
      transition: max-height 0.18s ease-out;
    }

    .settings-inner {
      padding: 12px 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 420px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .settings-inner::-webkit-scrollbar { width: 0; height: 0; }
    .settings-inner::-webkit-scrollbar-track { background: transparent; }
    .settings-inner::-webkit-scrollbar-thumb { background: var(--scrollbar, var(--border)); border-radius: 4px; }

    .settings-inner.has-scroll-tail {
      -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 32px), rgba(0, 0, 0, 0.35) calc(100% - 12px), transparent);
      mask-image: linear-gradient(to bottom, #000 calc(100% - 32px), rgba(0, 0, 0, 0.35) calc(100% - 12px), transparent);
    }

    .settings {
      cursor: default;
    }

    .settings * {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    .settings input,
    .settings textarea {
      cursor: text;
      user-select: text;
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
    }

    .settings button,
    .settings summary,
    .settings select,
    .settings .switch {
      cursor: pointer;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin: 0;
      padding-top: 0;
    }

    .setting-group + .setting-group {
      border-top: 0;
      padding-top: 0;
    }

    .setting-group > summary {
      list-style: none;
    }

    .setting-group > summary::-webkit-details-marker {
      display: none;
    }

    .setting-group > summary::marker {
      content: '';
    }

    .setting-group-title {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      height: 38px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition:
        color var(--motion-tap) ease,
        background var(--motion-tap) ease;
    }

    .setting-group-title::after {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-right: 1.5px solid var(--text-3);
      border-bottom: 1.5px solid var(--text-3);
      transform: rotate(45deg);
      transition: transform var(--motion-tap) ease, border-color var(--motion-tap) ease;
    }

    .setting-group-title:hover::after {
      border-color: var(--accent);
    }

    .setting-group-title:hover {
      color: var(--accent);
      background: transparent;
    }

    .setting-group[open] > .setting-group-title:hover {
      color: var(--accent);
      background: transparent;
    }

    .setting-group[open] > .setting-group-title::after {
      transform: rotate(-135deg);
      border-color: var(--accent);
    }

    .setting-group[open] > .setting-group-title {
      color: var(--accent);
      background: transparent;
    }

    .setting-group-body .setting-row > label:not(.switch) {
      color: var(--text-3);
    }

    .setting-group-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 4px 0 12px;
    }

    .setting-group:not([open]) > .setting-group-body {
      display: none;
    }

    .setting-group-title:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 28px;
    }

    .setting-row label {
      font-size: 12px;
      color: var(--text-2);
    }

    .switch {
      position: relative;
      width: 32px;
      height: 18px;
    }

    .switch input {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: 0;
      opacity: 0;
    }

    .switch-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .switch-track::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      top: 2px;
      left: 2px;
      background: #ffffff;
      border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }

    .switch input:checked + .switch-track {
      background: var(--accent);
    }

    .switch input:checked + .switch-track::after {
      transform: translateX(14px);
    }

    .switch input:focus-visible + .switch-track {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }

    .select-mini {
      font-size: 11px;
      font-family: inherit;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition:
        background var(--motion-tap) ease,
        color var(--motion-tap) ease,
        border-color var(--motion-tap) ease;
    }

    .select-mini:hover {
      background: var(--bg);
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
    }

    .select-mini:focus {
      background: var(--bg);
      color: var(--accent);
      border-color: var(--accent);
    }

    .watch-rule-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 6px;
      padding: 8px;
      border: 1px dashed var(--border-light);
      border-radius: 6px;
      background: color-mix(in srgb, var(--bg) 76%, var(--bg-sub));
    }

    .watch-input {
      min-width: 0;
      font-size: 11px;
      font-family: inherit;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition:
        background var(--motion-tap) ease,
        color var(--motion-tap) ease,
        border-color var(--motion-tap) ease;
    }

    .watch-input:hover {
      background: var(--bg);
      border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
    }

    .watch-input:focus {
      background: var(--bg);
      color: var(--text);
      border-color: var(--accent);
    }

    .watch-action-row {
      grid-column: 1 / 3;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      align-items: stretch;
      gap: 6px;
      min-width: 0;
    }

    .watch-action-row .watch-input-full {
      width: 100%;
      min-width: 0;
    }

    .watch-action-row .watch-add-btn {
      width: 100%;
      min-width: 0;
    }

    .watch-rules-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 168px;
      overflow-y: auto;
      padding-right: 0;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .watch-rules-list:empty {
      display: none;
    }

    .watch-rules-list.has-scroll-tail {
      -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 32px), rgba(0, 0, 0, 0.35) calc(100% - 12px), transparent);
      mask-image: linear-gradient(to bottom, #000 calc(100% - 32px), rgba(0, 0, 0, 0.35) calc(100% - 12px), transparent);
    }

    .watch-rules-list::-webkit-scrollbar { width: 0; height: 0; }
    .watch-rules-list::-webkit-scrollbar-track { background: transparent; }
    .watch-rules-list::-webkit-scrollbar-thumb { background: var(--scrollbar, var(--border)); border-radius: 4px; }

    .watch-rule-card {
      display: grid;
      flex: 0 0 auto;
      grid-template-columns: minmax(0, 1fr);
      align-items: start;
      width: 100%;
      min-width: 0;
      padding: 8px;
      border: 1px dashed var(--border-light);
      border-radius: 6px;
      background: color-mix(in srgb, var(--bg) 76%, var(--bg-sub));
      position: relative;
    }

    .watch-rule-card.disabled {
      opacity: 0.52;
    }

    .watch-rule-content {
      grid-column: 1 / -1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .watch-rule-head {
      grid-column: 1 / -1;
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .watch-rule-source {
      flex: 0 0 auto;
      font-size: 10px;
      color: var(--rule-source);
      white-space: nowrap;
    }

    .watch-rule-author {
      min-width: 0;
      flex: 1 1 auto;
      font-size: 11px;
      font-weight: 500;
      color: var(--rule-author);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .watch-keyword-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-width: 0;
    }

    .watch-keyword-tag {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      max-width: 100%;
      font-size: 10px;
      line-height: 1.2;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
      border-radius: 3px;
      padding: 1px 5px;
      gap: 4px;
    }

    .watch-keyword-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .watch-keyword-remove {
      flex: 0 0 auto;
      border: 0;
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      font: inherit;
      line-height: 1;
      padding: 0;
    }

    .watch-keyword-remove:hover {
      color: var(--state-fail);
    }

    .watch-rule-actions {
      margin-left: auto;
      flex: 0 0 auto;
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .watch-rule-actions .watch-rule-btn {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      height: 18px;
      font-size: 10px;
      line-height: 1;
    }

    .watch-rule-actions .watch-rule-btn[data-action="toggle"] {
      min-width: 34px;
    }

    .watch-rule-actions .watch-rule-btn[data-action="delete"] {
      min-width: 18px;
      padding-inline: 4px;
      font-size: 10px;
      line-height: 1;
      color: var(--text-3);
    }

    .watch-rule-actions .watch-rule-btn[data-action="delete"]:hover {
      color: var(--state-fail);
      background: var(--state-fail-softer);
      border-color: var(--state-fail-soft);
    }

    .watch-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      white-space: nowrap;
      margin-right: 6px;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
    }

    /* ---- List ---- */
    .list {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .list::-webkit-scrollbar { width: 0; height: 0; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: var(--scrollbar, var(--border)); border-radius: 4px; opacity: 0.5; }

    .initial-skeleton {
      pointer-events: none;
    }

    .skeleton-item {
      padding: var(--item-pad, 12px) 18px;
      border-bottom: 1px solid var(--border);
    }

    .skeleton-line {
      height: 10px;
      border-radius: 4px;
      background: color-mix(in srgb, var(--text-3) 14%, transparent);
      animation: skeleton-pulse 1.2s ease-in-out infinite;
    }

    .skeleton-title { width: 78%; }
    .skeleton-summary { width: 94%; margin-top: 12px; }
    .skeleton-meta { width: 36%; margin-top: 12px; height: 8px; }

    .skeleton-item:nth-child(2) .skeleton-title { width: 66%; }
    .skeleton-item:nth-child(2) .skeleton-summary { width: 88%; }
    .skeleton-item:nth-child(3) .skeleton-title { width: 72%; }
    .skeleton-item:nth-child(3) .skeleton-summary { width: 82%; }

    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.32; }
      50% { opacity: 0.62; }
    }

    /* Floating date badge */
    .date-label {
      position: sticky;
      top: 6px;
      z-index: 2;
      float: right;
      margin-right: 6px;
      margin-bottom: -24px;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-3);
      background: var(--bg-sub);
      border: 1px solid var(--border-light);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .date-label--watch {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 30%, transparent);
      background: color-mix(in srgb, var(--accent) 8%, var(--bg-sub));
    }

    /* Items */
    .item {
      display: flex;
      align-items: flex-start;
      padding: var(--item-pad, 12px) 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    .item:last-child { border-bottom: none; }

    .item:hover {
      background: color-mix(in srgb, var(--bg-item-hover) 88%, #000);
    }

    .item.read:hover {
      background: color-mix(in srgb, var(--bg-item-hover) 64%, #000);
    }

    .item:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: -2px;
    }

    .item.unread {
      background: var(--bg-unread);
    }

    .item.unread:hover {
      background: color-mix(in srgb, var(--bg-unread) 84%, #000);
    }

    .item.watch-item.unread {
      box-shadow: none;
    }

    .item.read .item-title {
      color: var(--text-read);
    }

    .item.read .item-meta {
      color: var(--text-read);
    }

    .item.read .cat-tag {
      opacity: 0.45;
    }

    /* Category tag */
    .cat-tag {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .cat-tag.cat-model { color: var(--cat-model); background: color-mix(in srgb, var(--cat-model) 9%, transparent); }
    .cat-tag.cat-products { color: var(--cat-products); background: color-mix(in srgb, var(--cat-products) 9%, transparent); }
    .cat-tag.cat-industry { color: var(--cat-industry); background: color-mix(in srgb, var(--cat-industry) 9%, transparent); }
    .cat-tag.cat-paper { color: var(--cat-paper); background: color-mix(in srgb, var(--cat-paper) 9%, transparent); }
    .cat-tag.cat-tips { color: var(--cat-tips); background: color-mix(in srgb, var(--cat-tips) 9%, transparent); }
    .cat-tag.cat-default { color: var(--cat-default); background: color-mix(in srgb, var(--cat-default) 9%, transparent); }

    .item-body {
      flex: 1;
      min-width: 0;
    }

    .item-title {
      font-size: var(--fs-title, 13px);
      font-weight: 400;
      line-height: 1.55;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item.unread .item-title {
      color: var(--text-unread, var(--text));
      font-weight: 500;
    }

    .item.unread .item-summary {
      color: var(--text-unread-2, var(--text-2));
    }

    .item.unread .item-meta {
      color: var(--text-unread-3, var(--text-3));
    }

    .item-summary {
      margin-top: 6px;
      font-size: var(--fs-meta, 12px);
      line-height: 1.65;
      color: var(--text-2);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item.read .item-summary {
      color: var(--text-read);
    }

    .item-meta {
      margin-top: 6px;
      font-size: var(--fs-meta, 11px);
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .item-meta .sep {
      width: 2px;
      height: 2px;
      background: currentColor;
      border-radius: 50%;
    }

    .empty-state {
      padding: 52px 20px;
      text-align: center;
      color: var(--text-3);
      font-size: 12px;
      line-height: 1.6;
    }


  </style>
  <script src="popup-log.js"></script>
  <script src="popup-boot.js"></script>
</head>
<body style="width: 420px; min-width: 420px; height: 600px; min-height: 600px; background: var(--bg, #101010); color-scheme: var(--color-scheme, dark);">
  <div class="header">
    <div class="brand">
      <a href="https://aihot.virxact.com/" target="_blank" rel="noopener noreferrer" aria-label="AI HOT">
        <svg class="brand-logo" viewBox="24 0 90 128" aria-hidden="true" focusable="false">
          <g class="brand-logo-mark">
            <path d="M35.84 115.2 L62.72 12.8" stroke-width="7"></path>
            <path d="M29.44 115.2 H42.24" stroke-width="3"></path>
            <path d="M89.6 115.2 V30.72" stroke-width="4"></path>
            <path d="M85.76 115.2 H93.44" stroke-width="3"></path>
            <path d="M48.64 66.56 H81.92" stroke-width="2"></path>
          </g>
          <circle class="brand-logo-dot" cx="89.6" cy="15.36" r="8"></circle>
        </svg>
      </a>
    </div>
    <div class="actions">
      <button class="btn-icon btn-mark-read" id="markAllRead" title="全部已读" aria-label="全部已读">
        <svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><path d="M4 20L20 4"/></svg>
      </button>
      <button class="btn-icon" id="pollNow" title="刷新" aria-label="刷新">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.5 0 4.9 1 6.7 2.7"/><path d="M21 3v6h-6"/></svg>
      </button>
      <button class="btn-icon" id="settingsBtn" title="设置" aria-label="设置">
        <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="8" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="16" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="10" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
  </div>

  <div class="settings" id="settingsPanel">
    <div class="settings-inner">
      <details class="setting-group" data-setting-group="general">
        <summary class="setting-group-title">常规</summary>
        <div class="setting-group-body">
          <div class="setting-row">
            <label>推送通知</label>
            <label class="switch">
              <input type="checkbox" id="enabled">
              <span class="switch-track"></span>
            </label>
          </div>
          <div class="setting-row">
            <label>检查频率</label>
            <select class="select-mini" id="interval">
              <option value="2">2 分钟</option>
              <option value="5">5 分钟</option>
              <option value="15">15 分钟</option>
              <option value="30">30 分钟</option>
              <option value="60">60 分钟</option>
            </select>
          </div>
          <div class="setting-row">
            <label>内容源</label>
            <select class="select-mini" id="feedMode">
              <option value="selected">精选</option>
              <option value="all">全部</option>
            </select>
          </div>
          <div class="setting-row">
            <label>显示天数</label>
            <select class="select-mini" id="historyDays">
              <option value="1">1 天</option>
              <option value="2" selected>2 天</option>
              <option value="3">3 天</option>
              <option value="5">5 天</option>
            </select>
          </div>
          <div class="setting-row">
            <label>定位</label>
            <select class="select-mini" id="openPositionMode">
              <option value="free">自由浏览</option>
              <option value="unread">未读优先</option>
            </select>
          </div>
        </div>
      </details>

      <details class="setting-group" data-setting-group="appearance">
        <summary class="setting-group-title">外观</summary>
        <div class="setting-group-body">
          <div class="setting-row">
            <label>主题</label>
            <select class="select-mini" id="theme">
              <option value="dark">墨夜</option>
              <option value="green-dark">暗森</option>
              <option value="chrome-dark">铬墨</option>
              <option value="slate-night">石青</option>
            </select>
          </div>
          <div class="setting-row">
            <label>字体</label>
            <select class="select-mini" id="fontFamily">
              <option value="system">系统</option>
              <option value="noto-serif">宋体</option>
              <option value="lxgw">楷体</option>
            </select>
          </div>
          <div class="setting-row">
            <label>字号</label>
            <select class="select-mini" id="fontSize">
              <option value="small">小</option>
              <option value="medium">默认</option>
              <option value="large">大</option>
              <option value="xlarge">特大</option>
              <option value="xxlarge">超大</option>
            </select>
          </div>
        </div>
      </details>

      <details class="setting-group watch-settings" data-setting-group="watch">
        <summary class="setting-group-title">特关</summary>
        <div class="setting-group-body">
          <div class="watch-rule-form">
            <input class="watch-input" id="watchSource" placeholder="来源">
            <input class="watch-input" id="watchAuthor" placeholder="作者">
            <div class="watch-action-row">
              <input class="watch-input watch-input-full" id="watchKeywords" placeholder="关键词，逗号分隔">
              <button class="btn-mini watch-add-btn" id="addWatchRule">添加</button>
            </div>
          </div>
          <div class="watch-rules-list" id="watchRulesList"></div>
        </div>
      </details>

      <details class="setting-group setting-group-debug" data-setting-group="debug">
        <summary class="setting-group-title">调试</summary>
        <div class="setting-group-body">
          <div class="setting-row">
            <label>日志</label>
            <button class="btn-mini" id="copyLogs">拷贝</button>
          </div>
        </div>
      </details>
    </div>
  </div>

  <div class="list" id="historyList">
    <div class="initial-skeleton" aria-hidden="true">
      <div class="skeleton-item">
        <div class="skeleton-line skeleton-title"></div>
        <div class="skeleton-line skeleton-summary"></div>
        <div class="skeleton-line skeleton-meta"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton-line skeleton-title"></div>
        <div class="skeleton-line skeleton-summary"></div>
        <div class="skeleton-line skeleton-meta"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton-line skeleton-title"></div>
        <div class="skeleton-line skeleton-summary"></div>
        <div class="skeleton-line skeleton-meta"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
