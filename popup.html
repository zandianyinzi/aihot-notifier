<!DOCTYPE html>
<html data-theme="dark" data-font="noto-sans" data-size="medium">
<head>
  <meta charset="utf-8">
  <style>
    @font-face {
      font-family: 'Fraunces Local';
      font-style: normal;
      font-display: block;
      font-weight: 500;
      src: url('fonts/fraunces-latin-500-normal.woff2') format('woff2');
    }

    [data-theme="dark"] {
      --bg: #111111;
      --bg-sub: #191919;
      --bg-hover: #242424;
      --bg-item-hover: #242424;
      --bg-unread: #171717;
      --border: #2c2c2c;
      --border-light: #222222;
      --text: #f0f0f0;
      --text-2: #b0b0b0;
      --text-3: #808080;
      --text-unread: #f0f0f0;
      --text-unread-2: #b0b0b0;
      --text-unread-3: #808080;
      --text-read: #7c7c7c;
      --text-read-hover: #8e8e8e;
      --accent: #ff8c5a;
      --accent-soft: rgba(255,140,90,0.10);
      --state-ok: #22c55e;
      --state-ok-soft: rgba(34,197,94,0.25);
      --state-ok-softer: rgba(34,197,94,0.15);
      --state-fail: #ef4444;
      --state-fail-soft: rgba(239,68,68,0.25);
      --state-fail-softer: rgba(239,68,68,0.15);
      --cat-model: #a78bfa;
      --cat-products: #60a5fa;
      --cat-industry: #fbbf24;
      --cat-paper: #34d399;
      --cat-tips: #f87171;
      --cat-default: #6b7280;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    [data-theme="green-dark"] {
      --bg: #101410;
      --bg-sub: #171d17;
      --bg-hover: #202420;
      --bg-item-hover: #1f211f;
      --bg-unread: #181f1c;
      --border: #2a3429;
      --border-light: #202620;
      --text: #e8e8df;
      --text-2: #b9b8ad;
      --text-3: #88877d;
      --text-unread: #eeeee6;
      --text-unread-2: #c2c1b8;
      --text-unread-3: #94928a;
      --text-read: #7f7e75;
      --text-read-hover: #99978f;
      --accent: #8fbdb2;
      --accent-soft: rgba(143,189,178,0.13);
      --state-ok: #8fbdb2;
      --state-ok-soft: rgba(143,189,178,0.24);
      --state-ok-softer: rgba(143,189,178,0.14);
      --state-fail: #c9898e;
      --state-fail-soft: rgba(201,137,142,0.23);
      --state-fail-softer: rgba(201,137,142,0.13);
      --cat-model: #b49afa;
      --cat-products: #6cb0fa;
      --cat-industry: #e8b830;
      --cat-paper: #40d8a0;
      --cat-tips: #fa8080;
      --cat-default: #838176;
      --shadow: 0 1px 3px rgba(0,0,0,0.35);
    }

    [data-size="small"] { --fs-base: 13px; --fs-title: 13px; --fs-meta: 11px; --item-pad: 12px; }
    [data-size="medium"] { --fs-base: 14px; --fs-title: 14px; --fs-meta: 12px; --item-pad: 14px; }
    [data-size="large"] { --fs-base: 15px; --fs-title: 15px; --fs-meta: 13px; --item-pad: 16px; }
    [data-size="xlarge"] { --fs-base: 17px; --fs-title: 17px; --fs-meta: 14px; --item-pad: 18px; }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }


    [data-font="noto-sans"] { --ff-body: 'Noto Sans SC', 'Source Han Sans SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif; }
    [data-font="noto-serif"] { --ff-body: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', SimSun, serif; }
    [data-font="lxgw"] { --ff-body: 'LXGW WenKai TC', 'LXGW WenKai', KaiTi, STKaiti, cursive; }
    [data-font="system"] { --ff-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

    html, body {
      height: 600px;
      overflow: hidden;
    }

    body {
      width: 420px;
      display: flex;
      flex-direction: column;
      font-family: var(--ff-body, 'Noto Sans SC', -apple-system, sans-serif);
      font-size: var(--fs-base, 14px);
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .brand a {
      width: 38px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      line-height: 0;
      transition: opacity 0.15s ease;
    }

    .brand a:hover {
      opacity: 0.8;
    }

    .brand-logo {
      width: 32px;
      height: 30px;
      display: block;
      flex: none;
      overflow: visible;
    }

    .brand-logo-mark {
      fill: none;
      stroke: #e85500;
      stroke-linecap: butt;
      stroke-linejoin: miter;
    }

    .brand-logo-dot {
      fill: #e40012;
      filter: drop-shadow(0 0 3px rgba(228,0,18,0.45));
      transform-box: fill-box;
      transform-origin: center;
      animation: logo-dot-breathe 2.2s ease-in-out infinite;
    }

    @keyframes logo-dot-breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.78); }
    }

    @media (prefers-reduced-motion: reduce) {
      .brand-logo-dot {
        animation: none;
      }
    }

    .actions {
      display: flex;
      gap: 2px;
    }

    .btn-icon {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      color: var(--text-3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-icon:hover {
      background: var(--bg-hover);
      color: var(--text-2);
    }

    .btn-icon:active {
      transform: scale(0.9);
    }

    .btn-mark-read {
      display: none;
    }

    .btn-mark-read.visible {
      display: flex;
    }

    .btn-mark-read.done {
      color: var(--accent);
      animation: mark-done 1.5s ease-out forwards;
    }

    @keyframes mark-done {
      0% { background: var(--accent-soft); color: var(--accent); transform: scale(1.1); }
      40% { background: var(--accent-soft); color: var(--accent); transform: scale(1); }
      100% { background: transparent; color: var(--accent); transform: scale(1); }
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-icon.spinning svg {
      animation: rotate 0.45s linear infinite;
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }

    .btn-icon.poll-ok {
      color: var(--state-ok);
      animation: flash-ok 3s ease-out forwards;
    }

    #pollNow.poll-ok {
      color: var(--accent);
      animation: flash-poll-ok 3s ease-out forwards;
    }

    .btn-icon.poll-fail {
      color: var(--state-fail);
      animation: flash-fail 3s ease-out forwards;
    }

    @keyframes flash-ok {
      0% { background: var(--state-ok-soft); color: var(--state-ok); }
      40% { background: var(--state-ok-softer); color: var(--state-ok); }
      100% { background: transparent; color: var(--text-3); }
    }

    @keyframes flash-poll-ok {
      0% { background: var(--accent-soft); color: var(--accent); }
      40% { background: var(--accent-soft); color: var(--accent); }
      100% { background: transparent; color: var(--text-3); }
    }

    @keyframes flash-fail {
      0% { background: var(--state-fail-soft); color: var(--state-fail); }
      40% { background: var(--state-fail-softer); color: var(--state-fail); }
      100% { background: transparent; color: var(--text-3); }
    }

    /* ---- Settings ---- */
    .settings {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
      background: var(--bg-sub);
    }

    .settings.open {
      max-height: 300px;
    }

    .settings-inner {
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .setting-row label {
      font-size: 12px;
      color: var(--text-2);
    }

    .switch {
      position: relative;
      width: 32px;
      height: 18px;
    }

    .switch input { display: none; }

    .switch-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .switch-track::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      top: 2px;
      left: 2px;
      background: #ffffff;
      border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }

    .switch input:checked + .switch-track {
      background: var(--accent);
    }

    .switch input:checked + .switch-track::after {
      transform: translateX(14px);
    }

    .select-mini {
      font-size: 11px;
      font-family: inherit;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    .select-mini:focus {
      border-color: var(--accent);
    }

    .badge {
      font-size: 10px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 3px 8px;
      border-radius: 9px;
      display: none;
      line-height: 1;
      align-items: center;
    }

    .badge.show { display: inline-flex; }


    /* ---- List ---- */
    .list {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .list::-webkit-scrollbar { width: 4px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; opacity: 0.5; }

    .initial-skeleton {
      pointer-events: none;
    }

    .skeleton-item {
      padding: var(--item-pad, 12px) 18px;
      border-bottom: 1px solid var(--border-light);
    }

    .skeleton-line {
      height: 10px;
      border-radius: 4px;
      background: color-mix(in srgb, var(--text-3) 14%, transparent);
      animation: skeleton-pulse 1.2s ease-in-out infinite;
    }

    .skeleton-title { width: 78%; }
    .skeleton-summary { width: 94%; margin-top: 12px; }
    .skeleton-meta { width: 36%; margin-top: 12px; height: 8px; }

    .skeleton-item:nth-child(2) .skeleton-title { width: 66%; }
    .skeleton-item:nth-child(2) .skeleton-summary { width: 88%; }
    .skeleton-item:nth-child(3) .skeleton-title { width: 72%; }
    .skeleton-item:nth-child(3) .skeleton-summary { width: 82%; }

    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.32; }
      50% { opacity: 0.62; }
    }

    /* Floating date badge */
    .date-label {
      position: sticky;
      top: 6px;
      z-index: 2;
      float: right;
      margin-right: 6px;
      margin-bottom: -24px;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-3);
      background: var(--bg-sub);
      border: 1px solid var(--border-light);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Items */
    .item {
      display: flex;
      align-items: flex-start;
      padding: var(--item-pad, 12px) 18px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.12s ease;
    }

    .item:last-child { border-bottom: none; }

    .item:hover {
      background: var(--bg-item-hover, var(--bg-hover));
    }

    .item.unread {
      background: var(--bg-unread);
      box-shadow: inset 2px 0 0 color-mix(in srgb, var(--accent) 56%, transparent);
    }

    .item.unread:hover {
      background: color-mix(in srgb, var(--bg-unread) 74%, var(--bg-item-hover, var(--bg-hover)));
    }

    .item.read .item-title {
      color: var(--text-read);
    }

    .item.read .item-meta {
      color: var(--text-read);
    }

    .item.read .cat-tag {
      opacity: 0.45;
    }

    /* Category tag */
    .cat-tag {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .cat-tag.cat-model { color: var(--cat-model); background: color-mix(in srgb, var(--cat-model) 12%, transparent); }
    .cat-tag.cat-products { color: var(--cat-products); background: color-mix(in srgb, var(--cat-products) 12%, transparent); }
    .cat-tag.cat-industry { color: var(--cat-industry); background: color-mix(in srgb, var(--cat-industry) 12%, transparent); }
    .cat-tag.cat-paper { color: var(--cat-paper); background: color-mix(in srgb, var(--cat-paper) 12%, transparent); }
    .cat-tag.cat-tips { color: var(--cat-tips); background: color-mix(in srgb, var(--cat-tips) 12%, transparent); }
    .cat-tag.cat-default { color: var(--cat-default); background: color-mix(in srgb, var(--cat-default) 12%, transparent); }

    .item-body {
      flex: 1;
      min-width: 0;
    }

    .item-title {
      font-size: var(--fs-title, 13px);
      font-weight: 400;
      line-height: 1.55;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item.unread .item-title {
      color: var(--text-unread, var(--text));
      font-weight: 500;
    }

    .item.unread .item-summary {
      color: var(--text-unread-2, var(--text-2));
    }

    .item.unread .item-meta {
      color: var(--text-unread-3, var(--text-3));
    }

    .item-summary {
      margin-top: 6px;
      font-size: var(--fs-meta, 12px);
      line-height: 1.65;
      color: var(--text-2);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item.read .item-summary {
      color: var(--text-read);
    }

    .item.read:hover .item-title,
    .item.read:hover .item-summary,
    .item.read:hover .item-meta {
      color: var(--text-read-hover, var(--text-read));
    }

    .item-meta {
      margin-top: 6px;
      font-size: var(--fs-meta, 11px);
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .item-meta .sep {
      width: 2px;
      height: 2px;
      background: currentColor;
      border-radius: 50%;
    }

    .empty-state {
      padding: 52px 20px;
      text-align: center;
      color: var(--text-3);
      font-size: 12px;
      line-height: 1.6;
    }


  </style>
  <script src="popup-boot.js"></script>
</head>
<body>
  <div class="header">
    <div class="brand">
      <a href="https://aihot.virxact.com/" target="_blank" rel="noopener noreferrer" aria-label="AI HOT">
        <svg class="brand-logo" viewBox="24 0 90 128" aria-hidden="true" focusable="false">
          <g class="brand-logo-mark">
            <path d="M35.84 115.2 L62.72 12.8" stroke-width="7"></path>
            <path d="M29.44 115.2 H42.24" stroke-width="3"></path>
            <path d="M89.6 115.2 V30.72" stroke-width="4"></path>
            <path d="M85.76 115.2 H93.44" stroke-width="3"></path>
            <path d="M48.64 66.56 H81.92" stroke-width="2"></path>
          </g>
          <circle class="brand-logo-dot" cx="89.6" cy="15.36" r="8"></circle>
        </svg>
      </a>
    </div>
    <div class="actions">
      <span class="badge" id="unreadCount"></span>
      <button class="btn-icon btn-mark-read" id="markAllRead" title="全部已读">
        <svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><path d="M4 20L20 4"/></svg>
      </button>
      <button class="btn-icon" id="pollNow" title="刷新">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.5 0 4.9 1 6.7 2.7"/><path d="M21 3v6h-6"/></svg>
      </button>
      <button class="btn-icon" id="settingsBtn" title="设置">
        <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="8" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="16" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="10" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
  </div>

  <div class="settings" id="settingsPanel">
    <div class="settings-inner">
      <div class="setting-row">
        <label>通知推送</label>
        <label class="switch">
          <input type="checkbox" id="enabled">
          <span class="switch-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <label>检查频率</label>
        <select class="select-mini" id="interval">
          <option value="2">2 分钟</option>
          <option value="5">5 分钟</option>
          <option value="15">15 分钟</option>
          <option value="30">30 分钟</option>
          <option value="60">60 分钟</option>
        </select>
      </div>
      <div class="setting-row">
        <label>外观</label>
        <select class="select-mini" id="theme">
          <option value="dark">墨夜</option>
          <option value="green-dark">暗森</option>
        </select>
      </div>
      <div class="setting-row">
        <label>字体</label>
        <select class="select-mini" id="fontFamily">
          <option value="noto-sans">黑体</option>
          <option value="noto-serif">宋体</option>
          <option value="lxgw">楷体</option>
          <option value="system">默认</option>
        </select>
      </div>
      <div class="setting-row">
        <label>字号</label>
        <select class="select-mini" id="fontSize">
          <option value="small">小</option>
          <option value="medium">默认</option>
          <option value="large">大</option>
          <option value="xlarge">特大</option>
        </select>
      </div>
      <div class="setting-row">
        <label>内容源</label>
        <select class="select-mini" id="feedMode">
          <option value="selected">精选</option>
          <option value="all">全部</option>
        </select>
      </div>
      <div class="setting-row">
        <label>显示天数</label>
        <select class="select-mini" id="historyDays">
          <option value="1">1 天</option>
          <option value="2" selected>2 天</option>
          <option value="3">3 天</option>
          <option value="5">5 天</option>
        </select>
      </div>
    </div>
  </div>

  <div class="list" id="historyList">
    <div class="initial-skeleton" aria-hidden="true">
      <div class="skeleton-item">
        <div class="skeleton-line skeleton-title"></div>
        <div class="skeleton-line skeleton-summary"></div>
        <div class="skeleton-line skeleton-meta"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton-line skeleton-title"></div>
        <div class="skeleton-line skeleton-summary"></div>
        <div class="skeleton-line skeleton-meta"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton-line skeleton-title"></div>
        <div class="skeleton-line skeleton-summary"></div>
        <div class="skeleton-line skeleton-meta"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
